services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: solar-sqlserver
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      SA_PASSWORD: ${SA_PASSWORD:-SolarDev!2026}
      MSSQL_PID: ${MSSQL_PID:-Express}
      SKIP_INIT_ON_START: ${SKIP_INIT_ON_START:-0}
    ports:
      - "${SQL_SERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./database/init:/scripts/init
      - ./database/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "-c", "bash /entrypoint.sh & /opt/mssql/bin/sqlservr"]
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD:-SolarDev!2026}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlserver-data:
    driver: local