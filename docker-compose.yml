services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: solar-sqlserver
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA:-Y}
      - SA_PASSWORD=${SA_PASSWORD:-Dev12345}
      - MSSQL_PID=${MSSQL_PID:-Express}
    ports:
      - "${SQL_SERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./database/init:/scripts/init
      - ./database/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "-c", "/entrypoint.sh & /opt/mssql/bin/sqlservr"]
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "${SQL_USER:-sa}", "-P", "${SQL_PASSWORD:-Dev12345}", "-C", "-Q", "SELECT 1"]
      interval: ${HEALTHCHECK_INTERVAL:-10s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: ${HEALTHCHECK_START_PERIOD:-30s}

volumes:
  sqlserver-data:
    driver: local