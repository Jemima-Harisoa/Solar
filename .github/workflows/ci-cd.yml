name: CI-CD Desktop Python

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  ci:
    name: CI - Tests DB SQL Server Docker
    runs-on: ubuntu-latest
    env:
      SA_PASSWORD: "SolarDev!2026"
      SQL_USER: sa
      SQL_PASSWORD: "SolarDev!2026"
      SQL_SERVER_HOST: 127.0.0.1
      DATABASE_NAME: solar
      SQL_CONTAINER_NAME: solar-sqlserver

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Start SQL Server
        run: |
          SKIP_INIT_ON_START=1 docker compose up -d sqlserver

      - name: Wait for SQL Server
        run: |
          for i in {1..20}; do
            status=$(docker inspect --format='{{json .State.Health.Status}}' solar-sqlserver 2>/dev/null || echo '"starting"')
            [ "$status" = '"healthy"' ] && echo "SQL Server ready" && exit 0
            echo "Attempt $i/20: $status"
            sleep 5
          done
          docker logs solar-sqlserver
          exit 1

      - name: Initialize schema and seed data
        run: |
          run_sql() {
            docker exec solar-sqlserver /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U "$SQL_USER" -P "$SA_PASSWORD" -C -b "$@"
          }
          run_sql -i /scripts/init/01-schema.sql
          run_sql -i /scripts/init/02-data.sql

      - name: Validate DB connection and seed data
        run: python ci/check_db_connection.py

      - name: Stop containers
        if: always()
        run: docker compose down -v

  cd:
    name: CD - Build Desktop Artifact
    runs-on: windows-latest
    needs: ci
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller --onefile --name solar-desktop main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-desktop-windows
          path: dist/solar-desktop.exe
          if-no-files-found: error